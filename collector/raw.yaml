# ────────────────────────────────────────────────────────────────────────────
# RAW MODE — no processing
# Data flows straight through to backends.
# Use this to show unmasked PII and high-cardinality metrics before BindPlane.
# ────────────────────────────────────────────────────────────────────────────

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    limit_mib: 512
    spike_limit_mib: 128
    check_interval: 5s

  batch:
    timeout: 2s
    send_batch_size: 512

  # Hint to Loki exporter which resource attrs to use as stream labels
  resource/loki_labels:
    attributes:
      - action: upsert
        key: loki.resource.labels
        value: "service.name, service.namespace"

exporters:
  # Metrics → Prometheus
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: demo

  # Logs → Loki
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

  # Traces → Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Print a sample of data to collector stdout (useful for demos)
  debug:
    verbosity: normal
    sampling_initial: 2
    sampling_thereafter: 500

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/loki_labels, batch]
      exporters: [loki, debug]
